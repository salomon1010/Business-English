<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business English Mastery — 12-Week System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a; --bg2:#0f1526; --card:#141b30; --card2:#1a2340;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.14);
  --txt:#e8ecf8; --mut:#8b94ad; --mut2:#5c6580;
  --acc:#6366f1; --acc2:#22d3ee; --gold:#fbbf24; --green:#34d399; --red:#f87171; --pink:#f472b6;
  --grad:linear-gradient(135deg,#6366f1,#22d3ee);
  --r:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:'Outfit',sans-serif;min-height:100vh;
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(99,102,241,.18),transparent),
  radial-gradient(ellipse 60% 40% at 90% 110%,rgba(34,211,238,.08),transparent)}
a{color:var(--acc2);text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;background:var(--bg2);border:1px solid var(--line2);color:var(--txt);border-radius:10px;padding:9px 12px;font-size:14px;width:100%}
input:focus,textarea:focus{outline:none;border-color:var(--acc)}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#2a3352;border-radius:9px}::-webkit-scrollbar-track{background:transparent}

/* NAV */
nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);background:rgba(10,14,26,.82);border-bottom:1px solid var(--line);padding:0 20px}
.nav-in{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:6px;height:62px;overflow-x:auto}
.brand{font-weight:800;font-size:17px;white-space:nowrap;margin-right:14px;display:flex;align-items:center;gap:9px}
.brand .logo{width:34px;height:34px;border-radius:10px;background:var(--grad);display:grid;place-items:center;font-size:17px}
.brand span.g{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.tab{border:none;background:transparent;color:var(--mut);padding:8px 14px;border-radius:99px;font-size:14px;font-weight:500;white-space:nowrap;transition:.2s}
.tab:hover{color:var(--txt);background:rgba(255,255,255,.05)}
.tab.on{color:#fff;background:var(--grad);font-weight:600}
.streak-pill{margin-left:auto;display:flex;align-items:center;gap:6px;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:var(--gold);padding:6px 13px;border-radius:99px;font-weight:700;font-size:14px;white-space:nowrap}

main{max-width:1180px;margin:0 auto;padding:30px 20px 90px}
.view{display:none;animation:fade .35s}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* GENERIC */
.eyebrow{font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--acc2);font-weight:700;margin-bottom:8px}
h1.big{font-size:clamp(28px,4.5vw,44px);font-weight:800;line-height:1.12;margin-bottom:10px}
h1.big em{font-style:italic;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{color:var(--mut);font-size:15.5px;max-width:720px;line-height:1.65}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.g3{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.g4{grid-template-columns:repeat(auto-fit,minmax(190px,1fr))}
.btn{border:none;border-radius:12px;padding:11px 20px;font-weight:600;font-size:14.5px;transition:.2s;display:inline-flex;align-items:center;gap:8px}
.btn-p{background:var(--grad);color:#fff}.btn-p:hover{filter:brightness(1.15);transform:translateY(-1px)}
.btn-g{background:var(--card2);color:var(--txt);border:1px solid var(--line2)}.btn-g:hover{border-color:var(--acc)}
.btn-danger{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.btn-sm{padding:7px 13px;font-size:13px;border-radius:9px}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 11px;border-radius:99px;border:1px solid var(--line2);color:var(--mut)}
.chip.p1{color:#a5b4fc;border-color:rgba(99,102,241,.4);background:rgba(99,102,241,.1)}
.chip.p2{color:#67e8f9;border-color:rgba(34,211,238,.4);background:rgba(34,211,238,.08)}
.chip.p3{color:#fcd34d;border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.08)}
.chip.done{color:var(--green);border-color:rgba(52,211,153,.4);background:rgba(52,211,153,.08)}
.bar{height:8px;background:var(--bg2);border-radius:99px;overflow:hidden}
.bar>i{display:block;height:100%;background:var(--grad);border-radius:99px;transition:width .5s}
.hr{border:none;border-top:1px solid var(--line);margin:18px 0}

/* DASHBOARD */
.hero{display:grid;grid-template-columns:1.4fr 1fr;gap:22px;margin-bottom:22px}
@media(max-width:860px){.hero{grid-template-columns:1fr}}
.ring-wrap{display:flex;align-items:center;gap:22px}
.ring{position:relative;width:150px;height:150px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:grid;place-items:center;font-size:30px;font-weight:800}
.ring .pct small{display:block;font-size:11px;color:var(--mut);font-weight:500;text-align:center}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px}
.stat .n{font-size:28px;font-weight:800}
.stat .l{font-size:12.5px;color:var(--mut);margin-top:3px}
.today-card{background:linear-gradient(135deg,rgba(99,102,241,.16),rgba(34,211,238,.08));border:1px solid rgba(99,102,241,.35)}

/* JOURNEY */
.wk-card{cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.wk-card:hover{transform:translateY(-3px);border-color:var(--acc)}
.wk-card .num{font-size:12px;font-weight:700;color:var(--mut2);letter-spacing:1px}
.wk-card h3{font-size:16.5px;margin:7px 0 9px;line-height:1.35}
.wk-card.locked{opacity:.55}
.dots{display:flex;gap:5px;margin-top:12px}
.dot{width:22px;height:22px;border-radius:7px;background:var(--bg2);border:1px solid var(--line2);display:grid;place-items:center;font-size:10px;color:var(--mut2);font-weight:700}
.dot.done{background:var(--grad);border:none;color:#fff}

/* WEEK DETAIL / DAYS */
.day-row{display:flex;align-items:center;gap:14px;padding:15px 18px;border:1px solid var(--line);border-radius:14px;background:var(--card);margin-bottom:10px;cursor:pointer;transition:.2s}
.day-row:hover{border-color:var(--acc);transform:translateX(3px)}
.day-row .ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:19px;flex:none;background:var(--bg2)}
.day-row.done .ic{background:rgba(52,211,153,.14)}
.day-row .t{flex:1;min-width:0}
.day-row .t b{display:block;font-size:15px}
.day-row .t span{font-size:13px;color:var(--mut);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.back{background:none;border:none;color:var(--acc2);font-size:14px;font-weight:600;margin-bottom:16px;display:inline-flex;gap:6px;align-items:center}

/* SESSION */
.sess-head{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
.step{display:flex;gap:12px;padding:12px 14px;border-radius:12px;border:1px solid var(--line);margin-bottom:8px;align-items:flex-start;cursor:pointer;transition:.15s;background:var(--card)}
.step:hover{border-color:var(--line2)}
.step.done{border-color:rgba(52,211,153,.35);background:rgba(52,211,153,.05)}
.step .cb{width:22px;height:22px;border-radius:7px;border:2px solid var(--mut2);flex:none;display:grid;place-items:center;font-size:12px;color:#fff;margin-top:1px}
.step.done .cb{background:var(--green);border-color:var(--green)}
.step .tm{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--acc2);font-weight:600}
.step p{font-size:14px;line-height:1.5;margin-top:2px}
.timer-box{text-align:center;padding:26px 20px}
.timer-digits{font-family:'JetBrains Mono',monospace;font-size:52px;font-weight:600;letter-spacing:2px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.score-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.score-b{width:36px;height:36px;border-radius:10px;border:1px solid var(--line2);background:var(--bg2);color:var(--mut);font-weight:700;font-size:14px}
.score-b.on{background:var(--grad);color:#fff;border:none}

/* RECORDER */
.rec-panel{background:var(--card2);border:1px solid var(--line2);border-radius:14px;padding:18px}
.rec-btn{width:74px;height:74px;border-radius:50%;border:none;background:var(--grad);color:#fff;font-size:28px;transition:.2s;box-shadow:0 6px 24px rgba(99,102,241,.4)}
.rec-btn.recording{background:linear-gradient(135deg,#ef4444,#f97316);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}50%{box-shadow:0 0 0 16px rgba(239,68,68,0)}}
.rec-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;background:var(--bg2);margin-top:8px;font-size:13px}
.rec-item audio{height:32px;flex:1;min-width:120px}
.rec-time{font-family:'JetBrains Mono',monospace;color:var(--red);font-weight:600;font-size:18px}

/* PHRASES */
.ph-card{border:1px solid var(--line);border-radius:14px;background:var(--card);padding:16px 18px;margin-bottom:10px}
.ph-card.mastered{border-color:rgba(52,211,153,.4)}
.ph-card .phrase{font-size:16.5px;font-weight:600;margin-bottom:4px}
.ph-card .use{font-size:13px;color:var(--mut);margin-bottom:10px}
.ph-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.idiom-tag{font-size:11px;font-weight:700;color:var(--pink);letter-spacing:1px}
.cat-tabs{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}
.cat-tab{border:1px solid var(--line2);background:var(--card);color:var(--mut);padding:7px 14px;border-radius:99px;font-size:13px;font-weight:600}
.cat-tab.on{background:var(--grad);color:#fff;border-color:transparent}

/* RESOURCES */
.res-card{display:block;border:1px solid var(--line);border-radius:var(--r);background:var(--card);padding:20px;transition:.2s;color:var(--txt)}
.res-card:hover{transform:translateY(-3px);border-color:var(--acc2)}
.res-card .ic{font-size:30px;margin-bottom:10px}
.res-card h3{font-size:16px;margin-bottom:6px}
.res-card p{font-size:13.5px;color:var(--mut);line-height:1.55}
.res-card .url{font-size:12px;color:var(--acc2);margin-top:10px;word-break:break-all}
.use-for{display:inline-block;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--gold);margin-top:8px}

/* REVIEW */
.slider-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.slider-row label{width:170px;font-size:14px;color:var(--mut);flex:none}
.slider-row input[type=range]{flex:1;accent-color:var(--acc)}
.slider-row .val{width:34px;text-align:center;font-weight:800;font-size:17px}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{padding:9px 10px;text-align:left;border-bottom:1px solid var(--line)}
th{color:var(--mut);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:1px}
.pass{color:var(--green);font-weight:700}.fail{color:var(--red);font-weight:700}

/* TUTOR */
.tutor-card{background:linear-gradient(135deg,rgba(244,114,182,.10),rgba(251,191,36,.06));border:1px solid rgba(244,114,182,.35)}
.chip.tut{color:var(--pink);border-color:rgba(244,114,182,.45);background:rgba(244,114,182,.09)}
.tut-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:860px){.tut-grid{grid-template-columns:1fr}}
.tut-week{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);margin-bottom:8px;font-size:14px}
.tut-slot{font-size:12px;font-weight:700;padding:4px 10px;border-radius:99px;border:1px solid var(--line2);color:var(--mut);cursor:pointer}
.tut-slot.done{background:rgba(244,114,182,.15);border-color:var(--pink);color:var(--pink)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card2);border:1px solid var(--acc);padding:12px 22px;border-radius:12px;font-weight:600;font-size:14px;z-index:99;transition:.3s;opacity:0}
.toast.show{transform:translateX(-50%);opacity:1}
.footer-note{text-align:center;color:var(--mut2);font-size:12.5px;margin-top:50px;line-height:1.7}
@media(max-width:640px){.ring-wrap{flex-direction:column;text-align:center}.slider-row label{width:110px}}
</style>
</head>
<body>

<nav><div class="nav-in">
  <div class="brand"><div class="logo">🗣️</div>BE <span class="g">Mastery</span></div>
  <button class="tab on" data-v="home">🏠 Dashboard</button>
  <button class="tab" data-v="journey">🗺️ 12 Weeks</button>
  <button class="tab" data-v="phrases">💬 Phrases & Idioms</button>
  <button class="tab" data-v="tutor">🎓 Tutor</button>
  <button class="tab" data-v="resources">📺 Resources</button>
  <button class="tab" data-v="review">📊 Reviews</button>
  <button class="tab" data-v="data">💾 My Data</button>
  <div class="streak-pill">🔥 <span id="streakN">0</span></div>
</div></nav>

<main>
  <div id="v-home" class="view on"></div>
  <div id="v-journey" class="view"></div>
  <div id="v-phrases" class="view"></div>
  <div id="v-tutor" class="view"></div>
  <div id="v-resources" class="view"></div>
  <div id="v-review" class="view"></div>
  <div id="v-data" class="view"></div>
  <div class="footer-note">12-Week Business English Mastery System · Built for Salomon · Progress is saved automatically in this browser<br>
  Brainjo Laws #9 & #10: practice until attention fades (20–25 min) — quality beats quantity.</div>
</main>
<div class="toast" id="toast"></div>

<script>
/* ================= DATA ================= */
const RESOURCES=[
 {ic:"🎬",name:"AskVinh",url:"https://www.youtube.com/@askvinh",desc:"Business English for professionals — meetings, interviews, corporate communication in a U.S. work context.",use:"MON & FRI · shadowing clips, Week 2–9 update & meeting language"},
 {ic:"🇺🇸",name:"Rachel's English",url:"https://www.youtube.com/@rachelsenglish",desc:"The reference for American pronunciation: rhythm, word stress, linking, reductions, intonation.",use:"MON & FRI · pronunciation & delivery days, all 12 weeks"},
 {ic:"👄",name:"Pronunciation with Emma",url:"https://www.youtube.com/@Pronunciationwithemma",desc:"Clear breakdowns of individual sounds, connected speech and common pronunciation mistakes.",use:"MON & FRI · fixing the 3 weaknesses you log each session"},
 {ic:"📝",name:"Engnovate",url:"https://engnovate.com/",desc:"Free English practice platform — speaking topics, IELTS-style prompts, and AI feedback on your answers.",use:"TUE & SAT · extra speaking drills and long-form practice"},
 {ic:"🎧",name:"Business English Pod",url:"https://www.youtube.com/@BusinessEnglishPod",desc:"Meeting simulations, negotiations, telephoning and presentations — realistic corporate dialogues.",use:"THU · meeting simulation source material"},
 {ic:"🏛️",name:"BBC Learning English",url:"https://www.youtube.com/@bbclearningenglish",desc:"Office English & English at Work series — professional phrases in context, news review for vocabulary.",use:"WED · phrase bank mining"},
 {ic:"💼",name:"Speak Confident English",url:"https://www.youtube.com/@Speakconfidentenglish",desc:"Fluency and confidence strategies for professionals — how to disagree, interrupt and lead in meetings.",use:"Weeks 7–11 · pushback, persuasion & leadership language"},
 {ic:"🎤",name:"YouGlish",url:"https://youglish.com/",desc:"Type any phrase and hear it spoken in thousands of real YouTube videos — perfect for checking stress and rhythm.",use:"ANY DAY · check how any phrase sounds in real speech"}
];

const DAY_META={
 Mon:{type:"Pronunciation + Shadowing",ic:"🎧"},
 Tue:{type:"Business Speaking Drill",ic:"🎯",tut:1},
 Wed:{type:"Vocabulary + Phrase Bank + Tutor Correction Notes",ic:"💬"},
 Thu:{type:"Meeting Simulation / Q&A",ic:"🧑‍💼"},
 Fri:{type:"Pronunciation + Delivery",ic:"🔊",tut:2},
 Sat:{type:"Long-form Speaking",ic:"🎤"},
 Sun:{type:"Weekly Review + Reset",ic:"📊"}
};

/* ====== PREPLY TUTOR (2×/week: Tue = Session 1, Fri = Session 2) ====== */
const TUTOR_PREP=[
 "Weekly theme confirmed — the session must be linked to this week's theme",
 "Target scenario written (e.g. “Explain that a dependency delay affects delivery by 1 week”)",
 "Solo recording made BEFORE the lesson (use the recorder on this page)",
 "My 3 main weaknesses listed (fillers, structure, pronunciation under speed…)",
 "5–10 phrases from this week's phrase bank ready to use live",
 "Correction priorities told to tutor: stop me when unnatural or too long; correct stress & phrasing, not just grammar"
];
const TUTOR_AGENDA=[
 ["0–5 min","Setup — tell the tutor the weekly theme, the scenario, and your correction priorities."],
 ["5–15 min","First live answer — update / blocker / recommendation / interview answer. Tutor listens and takes notes."],
 ["15–25 min","Correction round — structure, phrasing, pronunciation, business naturalness, grammar under pressure."],
 ["25–35 min","Second attempt — redo the same task with the corrections applied."],
 ["35–45 min","Pressure Q&A — “Why?” “What's the risk?” “What do you recommend?” “What if they disagree?”"],
 ["45–50 min","Close — tutor gives top 3 speaking errors, 5 corrected phrases, 1 pronunciation focus for next week."]
];
const TUTOR_LOG_FIELDS=[
 ["scenario","Scenario practiced","e.g. Standup update with blocker + ETA to my manager"],
 ["corr","Top 3 corrections received","1. …  2. …  3. …"],
 ["phr","Top 5 better phrases learned","Add the best ones to your phrase bank examples too"],
 ["pron","Pronunciation issue corrected","e.g. stress in multi-syllable business words, final consonants"],
 ["next","What to practice before next session","This feeds Wednesday's correction notes + Friday/Monday solo work"]
];
const TUTOR_USE=[["🎙️","Real-time correction","Unnatural phrasing, credibility-hurting grammar, stress & rhythm, vague answers — things you can't hear yourself."],["⚡","Pressure-tested live speaking","Interruption, follow-up questions, unpredictability, speed. Work conversations are not scripted monologues."],["🇺🇸","Accent & delivery","Mouth shape, intonation, word stress, linking, pacing — much harder to fix alone."],["✅","Accountability","Catches you talking around missing vocabulary, repeating weak patterns, staying in your comfort zone."]];
const TUTOR_SKIP=["Building your phrase bank","Filling your weekly tracker","Basic shadowing","Recording your self-intro 10 times","First drafts of answers","Reviewing your own recordings for fillers","Collecting phrases from clips"];

const TEMPLATES={
 Mon:[["0:00–2:00","Choose a 30–60 sec clip from a U.S. professional speaker (see Resources)."],["2:00–8:00","Transcribe it exactly."],["8:00–11:00","Mark stressed words, pauses, contractions, linked sounds, intonation."],["11:00–18:00","Shadow 6–8 times: listen → pause-repeat → speak with audio → speak alone."],["18:00–22:00","Record yourself imitating the clip (use the recorder below)."],["22:00–25:00","Log what sounded weak + one sound/stress pattern to fix next time."]],
 Tue:[["0:00–3:00","Write the prompt and your answer structure."],["3:00–8:00","Bullet points only: context → issue → action → result / next step."],["8:00–14:00","Record answer version 1."],["14:00–18:00","Listen back: mark filler words, grammar problems, vague wording, weak structure."],["18:00–23:00","Record improved version 2."],["23:00–25:00","Write your top 3 corrections in the notes."]],
 Wed:[["0:00–8:00","Study the 10–15 phrases + idioms for this week (Phrases tab)."],["8:00–16:00","Write 10 sentences of your own using your real work context."],["16:00–22:00","Say all 10 aloud — record the best run."],["22:00–25:00","Choose the best 5 phrases to actively reuse this week."]],
 Thu:[["0:00–4:00","Set the meeting scenario."],["4:00–8:00","List: your role, the problem, what you need to say."],["8:00–16:00","Record the simulated answer or discussion."],["16:00–21:00","Review: where you rambled, got unclear, or needed stronger phrases."],["21:00–25:00","Redo a cleaner version."]],
 Fri:[["0:00–2:00","Pick your weakest recording from this week."],["2:00–8:00","Mark where the pace, stress or tone was flat or rushed."],["8:00–11:00","Practice: slow down, stress key words, kill the monotone."],["11:00–18:00","Shadow / drill the problem sections 6–8 times."],["18:00–22:00","Record the improved 'after' version."],["22:00–25:00","Self-score clarity / pace / naturalness in the notes."]],
 Sat:[["0:00–5:00","Outline the talk (bullets, not a script)."],["5:00–12:00","Record the 3–5 minute answer / presentation."],["12:00–18:00","Review: clarity, confidence, structure, pronunciation, filler words."],["18:00–25:00","Redo the weakest section only."]],
 Sun:[["Step 1","Listen to at least 2 recordings from the week."],["Step 2","Score the week below in the Reviews tab: clarity, fluency, pronunciation, business naturalness, confidence."],["Step 3","Write 3 wins, 3 weaknesses, 3 corrections for next week."],["Step 4","Review the phrase bank and keep 5 active phrases for next week."]]
};

const WEEKS=[
 {n:1,phase:1,theme:"Introductions, role clarity & speech baseline",goal:"Build your baseline and start speaking clearly about yourself and your role.",days:{
  Mon:{focus:"Pronunciation baseline",task:"Shadow a 45–60 sec clip of a U.S. professional introducing themselves. Transcribe, mark stress & pauses, shadow 6–8×, record.",out:"Transcript · 1 recording · 3 pronunciation weaknesses noted"},
  Tue:{focus:"“Tell me about yourself”",task:"Record a 90-second answer: current role → core responsibilities → previous experience → current focus.",out:"Bullet outline · recording v1 · corrected v2"},
  Wed:{focus:"Core work vocabulary bank",task:"Build 15 phrases for introducing your role, then write 10 personal sentences using your real work.",out:"Phrase bank page: Role & Responsibilities"},

/* IndexedDB for recordings */
let DB=null;
const dbReady=new Promise(res=>{
  const rq=indexedDB.open("be12_recordings",1);
  rq.onupgradeneeded=e=>{const db=e.target.result;const st=db.createObjectStore("recs",{keyPath:"id",autoIncrement:true});st.createIndex("ctx","ctx")};
  rq.onsuccess=e=>{DB=e.target.result;res()};
  rq.onerror=()=>res();
});
function addRec(ctx,label,blob){return dbReady.then(()=>new Promise(res=>{
  if(!DB)return res(null);
  const tx=DB.transaction("recs","readwrite");
  tx.objectStore("recs").add({ctx,label,ts:Date.now(),blob});
  tx.oncomplete=()=>res(true);tx.onerror=()=>res(null);
}))}
function getRecs(ctx){return dbReady.then(()=>new Promise(res=>{
  if(!DB)return res([]);
  const out=[];const tx=DB.transaction("recs");
  tx.objectStore("recs").index("ctx").openCursor(IDBKeyRange.only(ctx)).onsuccess=e=>{
    const c=e.target.result;if(c){out.push(c.value);c.continue()}else res(out.sort((a,b)=>b.ts-a.ts))};
  tx.onerror=()=>res([]);
}))}
function delRec(id){return dbReady.then(()=>new Promise(res=>{
  if(!DB)return res();
  const tx=DB.transaction("recs","readwrite");tx.objectStore("recs").delete(id);tx.oncomplete=res;tx.onerror=res;
}))}
function countRecs(){return dbReady.then(()=>new Promise(res=>{
  if(!DB)return res(0);
  const rq=DB.transaction("recs").objectStore("recs").count();rq.onsuccess=()=>res(rq.result);rq.onerror=()=>res(0);
}))}

let rec={mr:null,chunks:[],t0:0,h:null,ctx:null,label:null};
window.recToggle=async(ctx,label)=>{
  const btn=document.getElementById("recBtn"),st=document.getElementById("recState");
  if(rec.mr&&rec.mr.state==="recording"){rec.mr.stop();return}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    rec={mr:new MediaRecorder(stream),chunks:[],t0:Date.now(),h:null,ctx,label};
    rec.mr.ondataavailable=e=>rec.chunks.push(e.data);
    rec.mr.onstop=async()=>{
      clearInterval(rec.h);stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(rec.chunks,{type:rec.mr.mimeType||"audio/webm"});
      await addRec(rec.ctx,rec.label,blob);
      markPracticed();save();
      if(btn){btn.classList.remove("recording")}
      if(st)st.textContent="Saved ✓ — tap to record again";
      toast("Recording saved 🎙️");
      renderRecs(rec.ctx);
      document.getElementById("streakN").textContent=streak();
    };
    rec.mr.start();
    btn.classList.add("recording");st.textContent="Recording… tap to stop";
    rec.h=setInterval(()=>{
      const s=Math.floor((Date.now()-rec.t0)/1000);
      const el=document.getElementById("recTime");
      if(el)el.textContent=`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
    },500);
  }catch(e){toast("⚠️ Microphone access denied — allow the mic in your browser.")}
};
async function renderRecs(ctx){
  const list=document.getElementById("recList");if(!list)return;
  const recs=await getRecs(ctx);
  list.innerHTML=recs.length?recs.map(r=>{
    const url=URL.createObjectURL(r.blob);
    const dt=new Date(r.ts).toLocaleString(undefined,{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});
    return `<div class="rec-item"><span style="color:var(--mut2);white-space:nowrap">${dt}</span>
      <audio controls src="${url}"></audio>
      <a class="btn btn-g btn-sm" href="${url}" download="${esc(r.label||'recording')}.webm" title="Download">⬇</a>
      <button class="btn btn-danger btn-sm" onclick="removeRec(${r.id},'${ctx}')">✕</button></div>`;
  }).join(""):`<p style="font-size:12.5px;color:var(--mut2);margin-top:12px">No recordings yet for this item.</p>`;
}
window.removeRec=async(id,ctx)=>{await delRec(id);renderRecs(ctx);toast("Recording deleted")};

function drawTrend(){
  const cv=document.getElementById("trend");if(!cv)return;
  const ctx=cv.getContext("2d");ctx.clearRect(0,0,480,150);
  const avgs=WEEKS.map(x=>{
    const s=(S.weekly[x.n]||{}).scores||{};const vals=REVIEW_AXES.map(a=>s[a]).filter(v=>v);
    return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null});
  ctx.strokeStyle="rgba(255,255,255,.08)";
  for(let y=0;y<=10;y+=5){ctx.beginPath();ctx.moveTo(20,140-y*13);ctx.lineTo(475,140-y*13);ctx.stroke()}
  const g=ctx.createLinearGradient(0,0,480,0);g.addColorStop(0,"#6366f1");g.addColorStop(1,"#22d3ee");
  ctx.strokeStyle=g;ctx.lineWidth=2.5;ctx.beginPath();let started=false;
  avgs.forEach((v,i)=>{if(v==null)return;const x=20+i*38,y=140-v*13;
    started?ctx.lineTo(x,y):ctx.moveTo(x,y);started=true});
  ctx.stroke();
  ctx.fillStyle="#22d3ee";
  avgs.forEach((v,i)=>{if(v==null)return;ctx.beginPath();ctx.arc(20+i*38,140-v*13,4,0,7);ctx.fill()});
}

      <button class="btn btn-p" onclick="expData()">⬇ Export progress (JSON)</button>
      <label class="btn btn-g" style="cursor:pointer">⬆ Import progress<input type="file" accept=".json" style="display:none" onchange="impData(this)"></label>
      <button class="btn btn-danger" onclick="resetAll()">🗑 Reset everything</button>
    </div>
    <p style="font-size:12.5px;color:var(--mut2);margin-top:12px">Note: the JSON export covers progress data only — audio blobs stay in this browser. Download the recordings you want to keep from their session pages.</p>
  </div>`;
}
window.expData=()=>{
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(S,null,2)],{type:"application/json"}));
  a.download=`business-english-progress-${new Date().toISOString().slice(0,10)}.json`;a.click();
  toast("Backup exported ⬇");
};
window.impData=inp=>{
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.days)throw 0;S=d;save();toast("Progress imported ✓");go("home")}catch(e){toast("⚠️ Invalid backup file")}};
  r.readAsText(f);
};
window.resetAll=()=>{
  if(!confirm("Delete ALL progress and recordings? This cannot be undone."))return;
  localStorage.removeItem(LS_KEY);
  dbReady.then(()=>{if(DB){const tx=DB.transaction("recs","readwrite");tx.objectStore("recs").clear()}});
  S=load();save();toast("Everything reset");go("home");
};

/* session view registration + boot */
const _views={home:rHome,journey:rJourney,phrases:rPhrases,resources:rResources,review:rReview,data:rData,session:rSession};
function goSession(){}
// extend router to handle session view (no nav tab)
(function(){
  const _go=go;
  window.go=function(v,a1,a2){
    if(v==="session"){
      cur={v,arg1:a1,arg2:a2};
      document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on",b.dataset.v==="journey"));
      document.querySelectorAll(".view").forEach(x=>x.classList.remove("on"));
      const el=document.getElementById("v-journey");el.classList.add("on");
      rSession(el,a1,a2);document.getElementById("streakN").textContent=streak();window.scrollTo({top:0});
      return;
    }
    _go(v,a1,a2);
  };
})();
go("home");
</script>
