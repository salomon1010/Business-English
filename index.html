<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business English Mastery — 12-Week System</title>
<meta name="theme-color" content="#0a0e1a">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a; --bg2:#0f1526; --card:#141b30; --card2:#1a2340;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.14);
  --txt:#e8ecf8; --mut:#8b94ad; --mut2:#5c6580;
  --acc:#6366f1; --acc2:#22d3ee; --gold:#fbbf24; --green:#34d399; --red:#f87171; --pink:#f472b6;
  --grad:linear-gradient(135deg,#6366f1,#22d3ee);
  --r:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:'Outfit',sans-serif;min-height:100vh;
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(99,102,241,.18),transparent),
  radial-gradient(ellipse 60% 40% at 90% 110%,rgba(34,211,238,.08),transparent)}
a{color:var(--acc2);text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;background:var(--bg2);border:1px solid var(--line2);color:var(--txt);border-radius:10px;padding:9px 12px;font-size:14px;width:100%}
input:focus,textarea:focus{outline:none;border-color:var(--acc)}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#2a3352;border-radius:9px}::-webkit-scrollbar-track{background:transparent}

/* NAV */
nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);background:rgba(10,14,26,.82);border-bottom:1px solid var(--line);padding:0 20px}
.nav-in{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:6px;height:62px;overflow-x:auto}
.brand{font-weight:800;font-size:17px;white-space:nowrap;margin-right:14px;display:flex;align-items:center;gap:9px}
.brand .logo{width:34px;height:34px;border-radius:10px;background:var(--grad);display:grid;place-items:center;font-size:17px}
.brand span.g{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.tab{border:none;background:transparent;color:var(--mut);padding:8px 14px;border-radius:99px;font-size:14px;font-weight:500;white-space:nowrap;transition:.2s}
.tab:hover{color:var(--txt);background:rgba(255,255,255,.05)}
.tab.on{color:#fff;background:var(--grad);font-weight:600}
.streak-pill{margin-left:auto;display:flex;align-items:center;gap:6px;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:var(--gold);padding:6px 13px;border-radius:99px;font-weight:700;font-size:14px;white-space:nowrap}

main{max-width:1180px;margin:0 auto;padding:30px 20px 90px}
.view{display:none;animation:fade .35s}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* GENERIC */
.eyebrow{font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--acc2);font-weight:700;margin-bottom:8px}
h1.big{font-size:clamp(28px,4.5vw,44px);font-weight:800;line-height:1.12;margin-bottom:10px}
h1.big em{font-style:italic;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{color:var(--mut);font-size:15.5px;max-width:720px;line-height:1.65}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.g3{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.g4{grid-template-columns:repeat(auto-fit,minmax(190px,1fr))}
.btn{border:none;border-radius:12px;padding:11px 20px;font-weight:600;font-size:14.5px;transition:.2s;display:inline-flex;align-items:center;gap:8px}
.btn-p{background:var(--grad);color:#fff}.btn-p:hover{filter:brightness(1.15);transform:translateY(-1px)}
.btn-g{background:var(--card2);color:var(--txt);border:1px solid var(--line2)}.btn-g:hover{border-color:var(--acc)}
.btn-danger{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.btn-sm{padding:7px 13px;font-size:13px;border-radius:9px}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 11px;border-radius:99px;border:1px solid var(--line2);color:var(--mut)}
.chip.p1{color:#a5b4fc;border-color:rgba(99,102,241,.4);background:rgba(99,102,241,.1)}
.chip.p2{color:#67e8f9;border-color:rgba(34,211,238,.4);background:rgba(34,211,238,.08)}
.chip.p3{color:#fcd34d;border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.08)}
.chip.done{color:var(--green);border-color:rgba(52,211,153,.4);background:rgba(52,211,153,.08)}
.bar{height:8px;background:var(--bg2);border-radius:99px;overflow:hidden}
.bar>i{display:block;height:100%;background:var(--grad);border-radius:99px;transition:width .5s}
.hr{border:none;border-top:1px solid var(--line);margin:18px 0}

/* DASHBOARD */
.hero{display:grid;grid-template-columns:1.4fr 1fr;gap:22px;margin-bottom:22px}
@media(max-width:860px){.hero{grid-template-columns:1fr}}
.ring-wrap{display:flex;align-items:center;gap:22px}
.ring{position:relative;width:150px;height:150px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:grid;place-items:center;font-size:30px;font-weight:800}
.ring .pct small{display:block;font-size:11px;color:var(--mut);font-weight:500;text-align:center}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px}
.stat .n{font-size:28px;font-weight:800}
.stat .l{font-size:12.5px;color:var(--mut);margin-top:3px}
.today-card{background:linear-gradient(135deg,rgba(99,102,241,.16),rgba(34,211,238,.08));border:1px solid rgba(99,102,241,.35)}

/* JOURNEY */
.wk-card{cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.wk-card:hover{transform:translateY(-3px);border-color:var(--acc)}
.wk-card .num{font-size:12px;font-weight:700;color:var(--mut2);letter-spacing:1px}
.wk-card h3{font-size:16.5px;margin:7px 0 9px;line-height:1.35}
.wk-card.locked{opacity:.55}
.dots{display:flex;gap:5px;margin-top:12px}
.dot{width:22px;height:22px;border-radius:7px;background:var(--bg2);border:1px solid var(--line2);display:grid;place-items:center;font-size:10px;color:var(--mut2);font-weight:700}
.dot.done{background:var(--grad);border:none;color:#fff}

/* WEEK DETAIL / DAYS */
.day-row{display:flex;align-items:center;gap:14px;padding:15px 18px;border:1px solid var(--line);border-radius:14px;background:var(--card);margin-bottom:10px;cursor:pointer;transition:.2s}
.day-row:hover{border-color:var(--acc);transform:translateX(3px)}
.day-row .ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:19px;flex:none;background:var(--bg2)}
.day-row.done .ic{background:rgba(52,211,153,.14)}
.day-row .t{flex:1;min-width:0}
.day-row .t b{display:block;font-size:15px}
.day-row .t span{font-size:13px;color:var(--mut);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.back{background:none;border:none;color:var(--acc2);font-size:14px;font-weight:600;margin-bottom:16px;display:inline-flex;gap:6px;align-items:center}

/* SESSION */
.sess-head{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
.step{display:flex;gap:12px;padding:12px 14px;border-radius:12px;border:1px solid var(--line);margin-bottom:8px;align-items:flex-start;cursor:pointer;transition:.15s;background:var(--card)}
.step:hover{border-color:var(--line2)}
.step.done{border-color:rgba(52,211,153,.35);background:rgba(52,211,153,.05)}
.step .cb{width:22px;height:22px;border-radius:7px;border:2px solid var(--mut2);flex:none;display:grid;place-items:center;font-size:12px;color:#fff;margin-top:1px}
.step.done .cb{background:var(--green);border-color:var(--green)}
.step .tm{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--acc2);font-weight:600}
.step p{font-size:14px;line-height:1.5;margin-top:2px}
.timer-box{text-align:center;padding:26px 20px}
.timer-digits{font-family:'JetBrains Mono',monospace;font-size:52px;font-weight:600;letter-spacing:2px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.score-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.score-b{width:36px;height:36px;border-radius:10px;border:1px solid var(--line2);background:var(--bg2);color:var(--mut);font-weight:700;font-size:14px}
.score-b.on{background:var(--grad);color:#fff;border:none}

/* RECORDER */
.rec-panel{background:var(--card2);border:1px solid var(--line2);border-radius:14px;padding:18px}
.rec-btn{width:74px;height:74px;border-radius:50%;border:none;background:var(--grad);color:#fff;font-size:28px;transition:.2s;box-shadow:0 6px 24px rgba(99,102,241,.4)}
.rec-btn.recording{background:linear-gradient(135deg,#ef4444,#f97316);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}50%{box-shadow:0 0 0 16px rgba(239,68,68,0)}}
.rec-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;background:var(--bg2);margin-top:8px;font-size:13px}
.rec-item audio{height:32px;flex:1;min-width:120px}
.rec-time{font-family:'JetBrains Mono',monospace;color:var(--red);font-weight:600;font-size:18px}

/* PHRASES */
.ph-card{border:1px solid var(--line);border-radius:14px;background:var(--card);padding:16px 18px;margin-bottom:10px}
.ph-card.mastered{border-color:rgba(52,211,153,.4)}
.ph-card .phrase{font-size:16.5px;font-weight:600;margin-bottom:4px}
.ph-card .use{font-size:13px;color:var(--mut);margin-bottom:10px}
.ph-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.idiom-tag{font-size:11px;font-weight:700;color:var(--pink);letter-spacing:1px}
.cat-tabs{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}
.cat-tab{border:1px solid var(--line2);background:var(--card);color:var(--mut);padding:7px 14px;border-radius:99px;font-size:13px;font-weight:600}
.cat-tab.on{background:var(--grad);color:#fff;border-color:transparent}

/* SHADOW (YouGlish-style clip looper) */
.yt-shell{background:#000;border:2px solid #000;border-radius:18px;overflow:hidden;box-shadow:0 14px 44px rgba(0,0,0,.45)}
.yt-ratio{position:relative;width:100%;aspect-ratio:16/9;background:#000}
.yt-ratio iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.sh-ctl{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:14px}
.sh-pill{display:flex;gap:2px;background:#000;border-radius:16px;padding:6px}
.sh-pill button{min-width:52px;height:44px;border:none;background:transparent;color:#fff;font-size:19px;border-radius:12px;transition:.15s}
.sh-pill button:hover{background:rgba(255,255,255,.14)}
.sh-round{width:46px;height:46px;border-radius:50%;border:1px solid var(--line2);background:var(--card);color:var(--txt);font-size:17px;transition:.15s}
.sh-round:hover{border-color:var(--acc2);color:var(--acc2)}
.sh-round.on{background:var(--grad);border:none;color:#fff}
.sh-time{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--acc2);font-weight:600;white-space:nowrap}
.sh-seg{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:14px;background:var(--card2);border:1px solid var(--line2);border-radius:14px;padding:12px 16px}
.sh-seg .lbl{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);font-weight:700}
.sh-len{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600}
.sh-len.ok{color:var(--green)}.sh-len.warn{color:var(--gold)}
.sh-count{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:600;background:#000;border:1px solid var(--line2);color:var(--txt);border-radius:10px;padding:5px 14px;min-width:72px;text-align:center;font-variant-numeric:tabular-nums}
.sh-count.go{border-color:var(--acc2);color:var(--acc2)}
.sh-count.ready{border-color:var(--green);color:var(--green)}
.sh-count.over{border-color:var(--gold);color:var(--gold);animation:pulse 1.2s infinite}
.clip-row{display:flex;align-items:center;gap:12px;padding:11px 15px;border:1px solid var(--line);border-radius:12px;background:var(--card);margin-top:8px;font-size:14px;cursor:pointer;transition:.15s}
.clip-row:hover{border-color:var(--acc)}
.clip-row .rng{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--acc2);white-space:nowrap}
.clip-row .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
/* SPEAKING FEEDBACK */
.fb-chips{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0}
.fb-chip{padding:4px 11px;border-radius:9px;font-size:13.5px;font-weight:600;border:1px solid var(--line2);color:var(--mut)}
.fb-chip.ok{color:var(--green);border-color:rgba(52,211,153,.45);background:rgba(52,211,153,.08)}
.fb-chip.bad{color:var(--gold);border-color:rgba(251,191,36,.5);background:rgba(251,191,36,.09)}
.fb-chip.miss{color:var(--red);border-color:rgba(248,113,113,.45);background:rgba(248,113,113,.07)}
.fb-item{border:1px solid var(--line);border-radius:14px;padding:15px 17px;background:var(--card);margin-bottom:10px}
.fb-item.fixed{border-color:rgba(52,211,153,.45)}
.fb-item .w{font-size:16.5px;font-weight:700;text-decoration:underline wavy var(--gold) 2px;text-underline-offset:4px}
.fb-item.fixed .w{text-decoration-color:var(--green)}
.fb-pct{font-family:'JetBrains Mono',monospace;background:rgba(251,191,36,.15);color:var(--gold);border-radius:8px;padding:2px 9px;font-weight:600;font-size:13px;float:right}
.fb-item.fixed .fb-pct{background:rgba(52,211,153,.15);color:var(--green)}
.fb-heard{font-size:13px;color:var(--mut);margin:10px 0 10px}
.fb-score-ring{font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:600}
/* POSTURE COACH */
.pc-wrap{display:none;margin-top:14px;background:var(--bg2);border:1px solid var(--line2);border-radius:12px;padding:12px}
.pc-row{display:flex;gap:14px;align-items:center}
.pc-cv{width:110px;height:146px;background:#0a0e1a;border-radius:10px;border:2.5px solid var(--line2);transition:border-color .3s,box-shadow .3s;flex:none}
.pc-cv.good{border-color:var(--green)}
.pc-cv.warn{border-color:var(--gold)}
.pc-cv.bad{border-color:#f97316;box-shadow:0 0 20px rgba(249,115,22,.45)}
/* VOCABULARY */
.voc-row{border:1px solid var(--line);border-radius:12px;background:var(--card);margin-bottom:8px;overflow:hidden}
.voc-head{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer}
.voc-head:hover{background:rgba(255,255,255,.03)}
.voc-head .wd{font-weight:700;font-size:15px}
.voc-lvl{font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px;letter-spacing:.5px}
.voc-lvl.a{background:rgba(52,211,153,.15);color:var(--green)}
.voc-lvl.b{background:rgba(99,102,241,.18);color:#a5b4fc}
.voc-lvl.c{background:rgba(251,191,36,.15);color:var(--gold)}
.voc-body{padding:0 14px 13px 52px;font-size:13.5px;color:var(--mut);display:none}
.voc-row.open .voc-body{display:block}
.voc-syn{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:12px;background:var(--card);padding:12px 16px;margin-bottom:8px;font-size:14.5px;flex-wrap:wrap}
.voc-syn .arr{color:var(--mut2)}
.voc-syn b.up{color:var(--acc2);border-bottom:1px dashed var(--acc2)}

/* RESOURCES */
.res-card{display:block;border:1px solid var(--line);border-radius:var(--r);background:var(--card);padding:20px;transition:.2s;color:var(--txt)}
.res-card:hover{transform:translateY(-3px);border-color:var(--acc2)}
.res-card .ic{font-size:30px;margin-bottom:10px}
.res-card h3{font-size:16px;margin-bottom:6px}
.res-card p{font-size:13.5px;color:var(--mut);line-height:1.55}
.res-card .url{font-size:12px;color:var(--acc2);margin-top:10px;word-break:break-all}
.use-for{display:inline-block;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--gold);margin-top:8px}

/* REVIEW */
.slider-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.slider-row label{width:170px;font-size:14px;color:var(--mut);flex:none}
.slider-row input[type=range]{flex:1;accent-color:var(--acc)}
.slider-row .val{width:34px;text-align:center;font-weight:800;font-size:17px}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{padding:9px 10px;text-align:left;border-bottom:1px solid var(--line)}
th{color:var(--mut);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:1px}
.pass{color:var(--green);font-weight:700}.fail{color:var(--red);font-weight:700}

/* ONBOARDING */
.ob-wrap{position:fixed;inset:0;z-index:100;background:var(--bg);display:grid;place-items:center;padding:24px;
  background-image:radial-gradient(ellipse 80% 55% at 50% -10%,rgba(99,102,241,.28),transparent),radial-gradient(ellipse 60% 45% at 90% 110%,rgba(34,211,238,.12),transparent)}
.ob-card{max-width:520px;width:100%;text-align:center;animation:fade .4s}
.ob-logo{width:76px;height:76px;border-radius:22px;background:var(--grad);display:grid;place-items:center;font-size:38px;margin:0 auto 20px;box-shadow:0 16px 50px rgba(99,102,241,.45)}
.ob-card h2{font-size:clamp(24px,5vw,34px);font-weight:800;letter-spacing:-.5px;line-height:1.15;margin-bottom:10px}
.ob-card .sub{margin:0 auto 26px}
.ob-chips{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:24px}
.ob-chip{border:1px solid var(--line2);background:var(--card);color:var(--txt);padding:12px 20px;border-radius:14px;font-size:14.5px;font-weight:600;transition:.15s}
.ob-chip:hover,.ob-chip.on{border-color:var(--acc);background:rgba(99,102,241,.14)}
.ob-dots{display:flex;gap:7px;justify-content:center;margin-top:26px}
.ob-dot{width:8px;height:8px;border-radius:50%;background:var(--line2)}
.ob-dot.on{background:var(--acc2);width:22px;border-radius:99px}
/* BOTTOM NAV (mobile app style) */
.bottom-nav{display:none}
.more-sheet{position:fixed;bottom:82px;right:10px;z-index:61;background:var(--card2);border:1px solid var(--line2);border-radius:16px;padding:8px;flex-direction:column;gap:2px;box-shadow:0 20px 60px rgba(0,0,0,.55);min-width:170px}
.more-sheet button,.more-sheet a{background:none;border:none;color:var(--txt);font-size:14.5px;font-weight:600;padding:11px 16px;border-radius:10px;text-align:left;text-decoration:none;display:block;width:100%}
.more-sheet button:active,.more-sheet a:active{background:rgba(255,255,255,.08)}
@media(max-width:820px){
  .nav-in button.tab,.nav-in a.tab{display:none}
  .bottom-nav{position:fixed;top:auto;bottom:0;left:0;right:0;z-index:60;display:flex;justify-content:space-around;align-items:stretch;
    background:rgba(15,21,38,.97);backdrop-filter:blur(16px);border-top:1px solid var(--line2);
    padding:7px 4px calc(7px + env(safe-area-inset-bottom))}
  .bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;
    color:var(--mut);font-size:10.5px;font-weight:600;padding:4px 2px;border-radius:12px;transition:.15s;font-family:inherit}
  .bnav-item .ic{font-size:21px;line-height:1;transition:.15s}
  .bnav-item.on{color:#fff}
  .bnav-item.on .ic{transform:translateY(-2px) scale(1.15)}
  .bnav-item.on::before{content:"";position:absolute;width:0}
  main{padding-bottom:110px}
  .toast{bottom:96px}
}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card2);border:1px solid var(--acc);padding:12px 22px;border-radius:12px;font-weight:600;font-size:14px;z-index:99;transition:.3s;opacity:0}
.toast.show{transform:translateX(-50%);opacity:1}
.footer-note{text-align:center;color:var(--mut2);font-size:12.5px;margin-top:50px;line-height:1.7}

/* IndexedDB for recordings */
let DB=null;
const dbReady=new Promise(res=>{
  const rq=indexedDB.open("be12_recordings",1);
  rq.onupgradeneeded=e=>{const db=e.target.result;const st=db.createObjectStore("recs",{keyPath:"id",autoIncrement:true});st.createIndex("ctx","ctx")};
  rq.onsuccess=e=>{DB=e.target.result;res()};
  rq.onerror=()=>res();
});
function addRec(ctx,label,blob,ts){return dbReady.then(()=>new Promise(res=>{
  if(!DB)return res(null);
  const tx=DB.transaction("recs","readwrite");
  tx.objectStore("recs").add({ctx,label,ts:ts||Date.now(),blob});
  tx.oncomplete=()=>res(true);tx.onerror=()=>res(null);
}))}
function allRecs(){return dbReady.then(()=>new Promise(res=>{
  if(!DB)return res([]);
  const rq=DB.transaction("recs").objectStore("recs").getAll();
  rq.onsuccess=()=>res(rq.result||[]);rq.onerror=()=>res([]);
}))}
function getRecs(ctx){return dbReady.then(()=>new Promise(res=>{
  if(!DB)return res([]);
  const out=[];const tx=DB.transaction("recs");
  tx.objectStore("recs").index("ctx").openCursor(IDBKeyRange.only(ctx)).onsuccess=e=>{
    const c=e.target.result;if(c){out.push(c.value);c.continue()}else res(out.sort((a,b)=>b.ts-a.ts))};
  tx.onerror=()=>res([]);
}))}
function delRec(id){return dbReady.then(()=>new Promise(res=>{
  if(!DB)return res();
  const tx=DB.transaction("recs","readwrite");tx.objectStore("recs").delete(id);tx.oncomplete=res;tx.onerror=res;
}))}
function countRecs(){return dbReady.then(()=>new Promise(res=>{
  if(!DB)return res(0);
  const rq=DB.transaction("recs").objectStore("recs").count();rq.onsuccess=()=>res(rq.result);rq.onerror=()=>res(0);
}))}

/* ================= GITHUB SYNC ================= */
/* Progress + recordings are pushed to a (private) GitHub repo via the Contents API,
   so any device with the token can load everything. Token lives ONLY in this browser
   (separate localStorage key — never included in progress.json or JSON exports). */
const GH_KEY="be12_gh";
let GH=(function(){try{return JSON.parse(localStorage.getItem(GH_KEY))||{}}catch(e){return{}}})();
function saveGH(){localStorage.setItem(GH_KEY,JSON.stringify(GH))}
function ghCfg(){return !!(GH.token&&GH.owner&&GH.repo)}
const ghBranch=()=>GH.branch||"main";
async function gh(path,opt={}){
  const url=`https://api.github.com/repos/${GH.owner}/${GH.repo}${path?"/"+path:""}`;
  const r=await fetch(url,Object.assign({},opt,{headers:Object.assign({Authorization:"Bearer "+GH.token,Accept:"application/vnd.github+json"},opt.headers||{})}));
  if(r.status===404)return null;
  if(!r.ok){let m="";try{m=(await r.json()).message}catch(e){}throw new Error(m||("HTTP "+r.status))}
  return r.json();
}
async function ghSha(path){try{const d=await gh(`contents/${path}?ref=${ghBranch()}`);return(d&&d.sha)||null}catch(e){return null}}
async function ghPut(path,b64,msg){
  const body={message:msg,content:b64,branch:ghBranch()};
  const sha=await ghSha(path);if(sha)body.sha=sha;
  try{return await gh(`contents/${path}`,{method:"PUT",body:JSON.stringify(body)})}
  catch(e){const s2=await ghSha(path);if(s2)body.sha=s2;else delete body.sha;
    return gh(`contents/${path}`,{method:"PUT",body:JSON.stringify(body)})}
}
const b64Enc=s=>btoa(unescape(encodeURIComponent(s)));
const b64Dec=b=>decodeURIComponent(escape(atob(b.replace(/\n/g,""))));
const blobToB64=blob=>new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.readAsDataURL(blob)});
function b64ToBlob(b64,type){const bin=atob(b64.replace(/\n/g,""));const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return new Blob([u],{type})}
let ghTimer=null;
function ghQueue(){clearTimeout(ghTimer);ghTimer=setTimeout(()=>ghPush(true),5000)}
function ghStatus(t){const el=document.getElementById("ghStatus");if(el)el.textContent=t}
function ghMetaText(){return ghCfg()?`Connected: ${GH.owner}/${GH.repo} (${ghBranch()})${GH.last?` · last sync ${new Date(GH.last).toLocaleString()}`:""}${GH.auto?" · ⚡ auto-sync ON":""}`:"Not connected yet"}
function refreshGhMeta(){const el=document.getElementById("ghMeta");if(el)el.textContent=ghMetaText()}
async function ghPush(silent){
  if(!ghCfg()){if(!silent)toast("⚠️ Connect GitHub sync first (My Data tab)");return}
  ghStatus("Saving progress to GitHub…");
  try{await ghPut("progress.json",b64Enc(JSON.stringify(S,null,1)),"progress sync "+new Date().toISOString());
    GH.last=Date.now();saveGH();ghStatus("");toast(silent?"☁️ Auto-synced to GitHub":"☁️ Progress saved to GitHub");refreshGhMeta()}
  catch(e){ghStatus("");toast("⚠️ GitHub save failed: "+e.message)}
}
async function ghPull(){
  if(!ghCfg())return toast("⚠️ Connect GitHub sync first");
  ghStatus("Loading progress from GitHub…");
  try{const d=await gh(`contents/progress.json?ref=${ghBranch()}`);
    if(!d){ghStatus("");return toast("No progress.json in the repo yet — press “Save to GitHub” on your main device first")}
    const data=JSON.parse(b64Dec(d.content));
    if(!data.days)throw new Error("unexpected file format");
    if(!confirm("Replace the progress on THIS device with the GitHub copy?")){ghStatus("");return}
    data.tutor=data.tutor||{};S=data;localStorage.setItem(LS_KEY,JSON.stringify(S));
    GH.last=Date.now();saveGH();ghStatus("");toast("📥 Progress loaded from GitHub");go("home")}
  catch(e){ghStatus("");toast("⚠️ Load failed: "+e.message)}
}
const recName=r=>`${r.ctx}__${r.ts}.webm`;
function labelFor(ctx){
  if(ctx.startsWith("phrase")){const p=PHRASES[+ctx.slice(6)];return p?p.p.slice(0,40):"phrase"}
  const m=ctx.match(/^w(\d+)([A-Za-z]{3})$/);return m?`W${m[1]} ${m[2]}`:ctx;
}
async function ghUpRecs(){
  if(!ghCfg())return toast("⚠️ Connect GitHub sync first");
  const recs=await allRecs();GH.up=GH.up||{};
  const todo=recs.filter(r=>!GH.up[recName(r)]);
  if(!todo.length)return toast("✓ All recordings already uploaded");
  let n=0;
  for(const r of todo){
    ghStatus(`Uploading recording ${n+1}/${todo.length}…`);
    try{await ghPut("recordings/"+recName(r),await blobToB64(r.blob),"recording upload");GH.up[recName(r)]=1;saveGH();n++}
    catch(e){ghStatus("");toast(`⚠️ Upload failed after ${n}: ${e.message}`);refreshGhMeta();return}
  }
  GH.last=Date.now();saveGH();ghStatus("");toast(`☁️ ${n} recording${n>1?"s":""} uploaded`);go("data");
}
async function ghDownRecs(){
  if(!ghCfg())return toast("⚠️ Connect GitHub sync first");
  ghStatus("Checking cloud recordings…");
  try{const list=await gh(`contents/recordings?ref=${ghBranch()}`);
    if(!list||!Array.isArray(list)||!list.length){ghStatus("");return toast("No recordings in the repo yet")}
    const local=new Set((await allRecs()).map(recName));GH.up=GH.up||{};
    const todo=list.filter(f=>f.name.endsWith(".webm")&&!local.has(f.name));
    if(!todo.length){ghStatus("");return toast("✓ All cloud recordings are already on this device")}
    let n=0;
    for(const f of todo){
      ghStatus(`Downloading ${n+1}/${todo.length}…`);
      const blob=await gh(`git/blobs/${f.sha}`);
      const parts=f.name.replace(".webm","").split("__");
      await addRec(parts[0],labelFor(parts[0]),b64ToBlob(blob.content,"audio/webm"),+parts[1]||Date.now());
      GH.up[f.name]=1;saveGH();n++;
    }
    ghStatus("");toast(`📥 ${n} recording${n>1?"s":""} restored to this device`);go("data")}
  catch(e){ghStatus("");toast("⚠️ Restore failed: "+e.message)}
}
/* ---- fully automatic sync ---- */
let ghRecBusy=false;
async function ghAutoStart(){
  if(!ghCfg()||!GH.auto)return;
  try{
    const d=await gh(`contents/progress.json?ref=${ghBranch()}`);
    if(d){
      const data=JSON.parse(b64Dec(d.content));
      if(data.days&&(data.savedAt||0)>(S.savedAt||0)){
        data.tutor=data.tutor||{};S=data;localStorage.setItem(LS_KEY,JSON.stringify(S));
        GH.last=Date.now();saveGH();toast("☁️ Latest progress loaded from cloud");
        go(cur.v==="session"?"session":cur.v,cur.arg1,cur.arg2);
      }else if((S.savedAt||0)>(data.savedAt||0)){ghPush(true)}
    }else if(S.savedAt){ghPush(true)}
    ghSyncRecs(false);
  }catch(e){}
}
async function ghSyncRecs(uploadOnly){
  if(!ghCfg()||ghRecBusy)return;ghRecBusy=true;
  try{
    GH.up=GH.up||{};
    const local=await allRecs();
    for(const r of local){const nm=recName(r);
      if(!GH.up[nm]){await ghPut("recordings/"+nm,await blobToB64(r.blob),"rec auto-sync");GH.up[nm]=1;GH.last=Date.now();saveGH()}}
    if(!uploadOnly){
      const list=await gh(`contents/recordings?ref=${ghBranch()}`);
      if(Array.isArray(list)){
        const have=new Set(local.map(recName));let n=0;
        for(const f of list){
          if(!f.name.endsWith(".webm")||have.has(f.name))continue;
          const b=await gh(`git/blobs/${f.sha}`);
          const parts=f.name.replace(".webm","").split("__");
          await addRec(parts[0],labelFor(parts[0]),b64ToBlob(b.content,"audio/webm"),+parts[1]||Date.now());
          GH.up[f.name]=1;saveGH();n++;
        }
        if(n)toast(`📥 ${n} recording${n>1?"s":""} synced from cloud`);
      }
    }
  }catch(e){}
  ghRecBusy=false;
}

};

function totalDone(){return Object.keys(S.days).filter(k=>S.days[k]).length}
function pct(){return Math.round(totalDone()/84*100)}
function currentPos(){
  for(const w of WEEKS){for(const d of DAYS){if(!S.days[dayKey(w.n,d)])return{w:w.n,d}}}

/* ===== WAVEFORM COMPARISON (latest take layered over the previous one) ===== */
let waveAC=null;
async function decodePeaks(blob,N){
  waveAC=waveAC||new (window.AudioContext||window.webkitAudioContext)();
  const buf=await waveAC.decodeAudioData(await blob.arrayBuffer());
  const d=buf.getChannelData(0),step=Math.max(1,Math.floor(d.length/N)),peaks=[];
  for(let i=0;i<N;i++){let m=0;const s=i*step,e=Math.min(s+step,d.length);
    for(let j=s;j<e;j+=16){const a=Math.abs(d[j]);if(a>m)m=a}
    peaks.push(m)}
  const mx=Math.max(...peaks,0.01);
  return{peaks:peaks.map(p=>p/mx),dur:buf.duration};
}
function countPauses(peaks,dur){
  const bucket=dur/peaks.length,minRun=Math.max(1,Math.round(0.3/bucket));
  let n=0,run=0;
  for(const p of peaks){if(p<0.08){run++}else{if(run>=minRun)n++;run=0}}
  return n;
}
async function waveRender(ctxName){
  const box=document.getElementById("waveBox");if(!box)return;
  try{
    const recs=await getRecs(ctxName);
    if(!recs.length){box.innerHTML="";return}
    const N=560;
    const latest=await decodePeaks(recs[0].blob,N);
    const prev=recs[1]?await decodePeaks(recs[1].blob,N):null;
    const W=640,H=150,mid=H/2;
    const cv=document.createElement("canvas");cv.width=W;cv.height=H;
    cv.style.cssText="width:100%;height:auto;display:block;background:#0a0e1a;border-radius:12px";
    const g=cv.getContext("2d");
    /* time-aligned: both drawn on the scale of the longer take, so pacing differences are visible */
    const maxDur=Math.max(latest.dur,prev?prev.dur:0)||1;
    const draw=(pk,dur,color)=>{
      const usable=W*(dur/maxDur),bw=usable/pk.length;
      g.fillStyle=color;
      for(let i=0;i<pk.length;i++){
        const h=Math.max(1.5,pk[i]*(H/2-8));
        g.fillRect(i*bw,mid-h,Math.max(1,bw*0.75),h*2);
      }
    };
    if(prev)draw(prev.peaks,prev.dur,"rgba(99,102,241,.42)");
    draw(latest.peaks,latest.dur,"rgba(34,211,238,.8)");
    g.fillStyle="rgba(255,255,255,.25)";g.fillRect(0,mid,W,1);
    const pl=countPauses(latest.peaks,latest.dur);
    let insight;
    if(prev){
      const dd=latest.dur-prev.dur,pp=countPauses(prev.peaks,prev.dur);
      insight=`Latest take <b style="color:var(--acc2)">${latest.dur.toFixed(1)}s</b> vs previous <b style="color:#a5b4fc">${prev.dur.toFixed(1)}s</b>`
        +(Math.abs(dd)>=0.8?dd<0?` — <b style="color:var(--green)">${(-dd).toFixed(1)}s tighter — more confident pacing 📈</b>`:` — ${dd.toFixed(1)}s longer — aim for a tighter delivery`:" — consistent pacing ✅")
        +` · pauses: ${pl}${pp!==pl?` (was ${pp})`:""}`;
    }else{
      insight=`First take: <b style="color:var(--acc2)">${latest.dur.toFixed(1)}s</b> · ${pl} pause${pl!==1?"s":""} — record a second take and watch the waveforms overlap`;
    }
    box.innerHTML=`<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px">
      <b style="font-size:13.5px">📈 Waveform — see your voice change</b>
      <span style="flex:1"></span>
      ${prev?`<span class="chip" style="border-color:rgba(99,102,241,.5);color:#a5b4fc">▮ previous</span>`:""}
      <span class="chip" style="border-color:rgba(34,211,238,.5);color:#67e8f9">▮ latest</span>
    </div>`;
    box.appendChild(cv);
    box.insertAdjacentHTML("beforeend",`<p style="font-size:12.5px;color:var(--mut);margin-top:8px">${insight}</p>`);
  }catch(e){box.innerHTML=""}
}

window.tbTry=word=>{

  const r=new SR();r.lang="en-US";r.maxAlternatives=5;
  let got=false;
  r.onresult=e=>{
    got=true;
    const alts=[...e.results[0]].map(a=>a.transcript.toLowerCase().trim());
    const hit=alts.some(a=>fbTokens(a).some(x=>x===word||wsim(x,word)>=85));
    if(hit){
      S.trouble[word]--;if(S.trouble[word]<=0)delete S.trouble[word];
      save();tbRender();
      toast(S.trouble[word]?`✅ “${word}” — good! ${S.trouble[word]} more to clear it`:`🏆 “${word}” cleared from your trouble list!`);
    }else if(res)res.textContent=`Heard “${alts[0]||"…"}” — 🔊 listen, then try again`;
  };
  r.onerror=()=>{if(res)res.textContent="Mic error — try again"};
  r.onend=()=>{if(!got&&res&&res.textContent.startsWith("Listening"))res.textContent="Didn't hear you — try again"};
  r.start();
};

function shStartTick(){
  clearInterval(shTick);

    if(!ytPlayer||!ytPlayer.getCurrentTime)return;
    let t=0;try{t=ytPlayer.getCurrentTime()}catch(_){return}
    const now=document.getElementById("shNow");if(now)now.textContent=fmtT(t);
    if(shCounting){
      const c=document.getElementById("shCount");
      const el=Math.max(0,t-shClip.start);
      if(c){
        c.textContent=Math.floor(el)+"s";
        c.className="sh-count "+(el>=30?"over":el>=20?"ready":"go");
      }
      if(el>=20&&!shPing[20]){shPing[20]=1;toast("⏱ 20 seconds — you can mark the end now ✅")}
      if(el>=30&&!shPing[30]){shPing[30]=1;toast("⏱ 30 seconds — perfect length, mark the end! 🎯")}
    }else if(shClip.end>shClip.start){
      /* playback mode: show position inside the clip, resetting to 0 on every loop */

        c.textContent=Math.floor(el)+"s / "+Math.round(shClip.end-shClip.start)+"s";
        c.className="sh-count go";
      }
    }
    if(shClip.end>shClip.start&&t>=shClip.end){
      if(shLooping)ytPlayer.seekTo(shClip.start,true);

  }
  const SOFT=[[/\bi think maybe (we|you|they) (should|need to|could)\b/gi,"I recommend $1"],[/\brecommend (we|you|they) need to\b/gi,"recommend $1"],[/\bi think maybe\b,?\s*/gi,""],[/\bi think\b,?\s*/gi,""],[/\bmaybe\b\s*/gi,""],[/\bsorry about that\b[.,]?\s*/gi,""],[/\bto be honest\b,?\s*/gi,""],[/\bkind of\b/gi,""],[/\bsort of\b/gi,""],[/\bjust\b/gi,""],[/\bstuff\b/gi,"work"],[/\bthings\b/gi,"items"],[/\ba lot of\b/gi,"significant"],[/\bvery very\b/gi,"extremely"]];
  for(const[re,rep]of SOFT){if(re.test(out)){out=out.replace(re,rep);changes.push(`“${re.source.replace(/\\b|\(.*?\)/g,"").trim()}” → ${rep?rep.replace(/\$1\s*/,""):"(removed)"}`)}}
  for(const[re,bad,corr]of GRAM_FIX){
    if(re.test(out)){out=out.replace(re,m=>corr==="for X years"?m.replace(/since/i,"for"):corr);changes.push(`${bad} → ${corr}`)}
  }
  for(const[a,b]of Object.entries(SYN_UP)){
    /* don't upgrade verbs into ungrammatical infinitives: "need to" stays "need to" */
    const re=a==="need"?/\bneed\b(?!\s+to)/gi:a==="get"?/\bget\b(?!\s+(to|up|back|it|out))/gi:new RegExp("\\b"+a+"\\b","gi");
    if(re.test(out)){out=out.replace(re,b);changes.push(`${a} → ${b}`)}
  }
  out=out.replace(/\s+/g," ").replace(/\s+([,.!?])/g,"$1").trim();
  if(out)out=out[0].toUpperCase()+out.slice(1);
  if(out&&!/[.!?]$/.test(out))out+=".";
  return{out,changes};
}

function pgArea(data,stroke,W,H,unit){
  if(data.length<2)return`<div style="height:${H}px;display:grid;place-items:center;color:var(--mut2);font-size:12.5px">Record 2+ speaking-feedback sessions to see your curve 📈</div>`;
  const P=14,n=data.length;
  const lo=Math.min(...data)*0.9,hi=Math.max(...data)*1.05||1;
  const X=i=>P+i/(n-1)*(W-2*P),Y=v=>H-P-(v-lo)/(hi-lo||1)*(H-2*P);
  const pts=data.map((v,i)=>[X(i),Y(v)]);
  const line=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  const gid="g"+Math.random().toString(36).slice(2,7);
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">

      <stop offset="0%" stop-color="${stroke}" stop-opacity=".35"/><stop offset="100%" stop-color="${stroke}" stop-opacity="0"/></linearGradient></defs>
    ${[0.25,0.5,0.75].map(f=>`<line x1="${P}" x2="${W-P}" y1="${(H-2*P)*f+P}" y2="${(H-2*P)*f+P}" stroke="rgba(255,255,255,.06)"/>`).join("")}
    <path d="${line} L${pts[n-1][0]},${H-P} L${pts[0][0]},${H-P} Z" fill="url(#${gid})"/>
    <path d="${line}" fill="none" stroke="${stroke}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${pts[n-1][0]}" cy="${pts[n-1][1]}" r="4.5" fill="${stroke}" stroke="var(--card)" stroke-width="2"/>
    <text x="${pts[n-1][0]-6}" y="${pts[n-1][1]-9}" text-anchor="end" font-size="12" font-weight="700" fill="var(--txt)" font-family="JetBrains Mono,monospace">${data[n-1]}${unit}</text>
    ${pts.map((p,i)=>`<rect x="${p[0]-((W-2*P)/(n-1))/2}" y="0" width="${(W-2*P)/(n-1)}" height="${H}" fill="transparent"><title>${unit==="%"?"Attempt":"Entry"} ${i+1}: ${data[i]}${unit}</title></rect>`).join("")}
  </svg>`;
}
function pgBars(days,W,H){
  const P=8,max=Math.max(...days.map(d=>d.v),1),bw=(W-2*P)/days.length;

    ${days.map((d,i)=>{

function drawTrend(){
  const cv=document.getElementById("trend");if(!cv)return;
  const ctx=cv.getContext("2d");ctx.clearRect(0,0,480,150);
  const avgs=WEEKS.map(x=>{
    const s=(S.weekly[x.n]||{}).scores||{};const vals=REVIEW_AXES.map(a=>s[a]).filter(v=>v);
    return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null});
  ctx.strokeStyle="rgba(255,255,255,.08)";
  for(let y=0;y<=10;y+=5){ctx.beginPath();ctx.moveTo(20,140-y*13);ctx.lineTo(475,140-y*13);ctx.stroke()}
  const g=ctx.createLinearGradient(0,0,480,0);g.addColorStop(0,"#6366f1");g.addColorStop(1,"#22d3ee");
  ctx.strokeStyle=g;ctx.lineWidth=2.5;ctx.beginPath();let started=false;
  avgs.forEach((v,i)=>{if(v==null)return;const x=20+i*38,y=140-v*13;
    started?ctx.lineTo(x,y):ctx.moveTo(x,y);started=true});
  ctx.stroke();
  ctx.fillStyle="#22d3ee";
  avgs.forEach((v,i)=>{if(v==null)return;ctx.beginPath();ctx.arc(20+i*38,140-v*13,4,0,7);ctx.fill()});
}
